    init_identity_mask: true
    case_name: "init_identity=True (esperado ~= mixture)"
  - name: "init_identity=False (mascara aleatoria, demo end-to-end)"
    init_identity_mask: false
    case_name: "init_identity=False (mascara aleatoria, demo end-to-end)"
