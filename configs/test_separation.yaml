# @package _global_

defaults:
  - _self_
  - data: guidesep_smoke
  - model: separation_smoke
  - trainer: auto
  - paths: default
  - extras: default
  - hydra: default

task_name: test_separation
tags: ["dev", "smoke", "separation"]
seed: 0

smoke_cases:
