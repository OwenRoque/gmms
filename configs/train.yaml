# @package _global_

defaults:
  - _self_
  - data: slakh_babyslakh
  - model: guided_separation
  - trainer: auto
  - paths: default
  - extras: default
  - hydra: default

task_name: train
tags: ["train", "slakh", "guided"]
seed: 42

train: true
test: false

optimized_metric: val/loss
optimized_metric_mode: min

# Overrides ligeros para entrenamiento inicial en BabySlakh (20 tracks)
model:
  feature:
    sample_rate: 16000
    mono: true
    n_fft: 1024
    hop_length: 256
    dim: 64
    depth: 2
    time_transformer_depth: 1
    freq_transformer_depth: 1
    linear_transformer_depth: 0
    heads: 4
    dim_head: 16
    mask_estimator_depth: 1
    multi_stft_loss_weight: 0.0
  lr: 1.0e-4
  multi_stft_loss_weight: 0.0

data:
  feature:
    sample_rate: 16000
    mono: true
    n_fft: 1024
    hop_length: 256
    dim: 64
    depth: 2
    time_transformer_depth: 1
    freq_transformer_depth: 1
    linear_transformer_depth: 0
    heads: 4
    dim_head: 16
    mask_estimator_depth: 1
  segment_seconds: 2.0
  batch_size: 1
  num_workers: 0
  pin_memory: true
  humming_prob: 0.0
  org_mix_prob: 1.0
  extract_humtrans_wav: false

trainer:
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  max_epochs: 1
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  limit_train_batches: null
  limit_val_batches: null
  check_val_every_n_epoch: 1
